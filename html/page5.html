<!DOCTYPE html>
<html lang = "vi">
        <head>
                <title> tính diện tích hình chử nhật  </title>
                <meta charset = "utf-8">
				<link href = "../css/style01.css/" rel ="stylesheet">
        </head>
        <body>
             <script>
        
    //Nhập chiều dài
    let d = Number(prompt("Nhập vào chiều dài! "));
    let r;

    //Nhập chiều rộng nhé
    do{
        r = Number(prompt("Nhập vào chiều rộng! "));
        if(r>d)
            alert("Nhập lại chiều rộng đúng đi....!");
    }while(r>d);

    //Nếu chiều rộng = chiều dài thì tính diện tích hình vuông
    if(r==d)
    {
        alert(`TRƯỜNG HỢP ĐẶC BIỆT! Diện tích hình vuông có cạnh ${d} cm là ${d*r} cm²`);
    }
    else //Nếu chiều rộng nhỏ hơn chiều dài thì tính diện tích hình chữ nhật
    {
        alert(`Diện tích hình chữ nhật có chiều dài ${d}cm và chiều rộng ${r}cm là ${d*r} cm²`);
    }




			 </script>
        </body>
</html>
