<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Chi tiết sản phẩm</title>
    <meta charset="utf-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="../js/lib.js"></script>
</head>
<body>
    <div class="container mt-4">
        <img id="img" src="" style="width: 300px">
        <p id="name"></p>
        <p id="price"></p>
        <p id="desc"></p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('ma');
        const foundProduct = products.find(item => item.id == productId);

        if (foundProduct) {
    document.getElementById("name").innerHTML = foundProduct.name;
    document.getElementById("price").innerText = foundProduct.price.toLocaleString() + " VNĐ";
    document.getElementById("img").src = foundProduct.image;
    
    // Dùng descriptionFull thay vì description
    document.getElementById("desc").innerHTML = foundProduct.descriptionFull;
}
    </script>
</body>
</html>
